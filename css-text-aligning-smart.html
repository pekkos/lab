<!DOCTYPE html>

<html>

<head>
  <title>Alignning text smartly with CSS</title>

  <style>

    img {
      max-width: 100%;
    }

    .box {
      margin: 40px auto;
      width: 400px;
    }

    figure {
      margin: 0;
      text-align: center;
    }

    figcaption {
      display: inline-block;
      text-align: left;
    }

  </style>

</head>

<body>

  <p>A clever way to smartly align text to the left, if it spans over more than one line.</p>
  <p>As described by <a href="http://nocode.in/aligning-text-smartly-in-css/">Vijay Sharma</a></p>

  <div class="box">
    <figure>
      <img src="img/manhattan.jpg/">
      <figcaption>
        Manhattan from above.
      </figcaption>
    </figure>
  </div>

  <div class="box">
    <figure>
      <img src="img/manhattan.jpg/">
      <figcaption>
        Manhattan, as seen from a plane, quite high above the city. You can clearly see the scyscrapers picking holes in the clouds.
      </figcaption>
    </figure>
  </div>

</body>

</html>
