<!DOCTYPE html>
<html>

<head>
</head>
  <body>

<p>vocalizer</p>
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vocalizer/1.0.0/vocalizer.min.js"></script>

<span class="vocalizer" data-source="auto">Jonas</span>
    <span class="vocalizer surname" data-source="auto"><b>Pecos</b></span>

    <style>
      .vocalizer {
        display: inline-block;
      }
      
      .vocalizer b {
        display: inline-block;
        text-indent: 100%;
        overflow: hidden;
        font-weight: normal;
        width: 0;
      }
      
      .vocalizer + .vocalizer:before {
        content: "Päckos";
      }
    </style>
    
  </body>

</html>
